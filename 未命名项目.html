<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>未命名项目</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#0c0c18;min-height:100vh;color:#ededfc}
    .canvas{position:relative;width:900px;min-height:580px;margin:0 auto}
    .ico{font-family:'Material Symbols Outlined';font-size:16px;line-height:1;display:inline-block;-webkit-font-feature-settings:'liga';font-feature-settings:'liga'}
    .i-btn{background:#4f7ef8;color:#fff;padding:10px 22px;border-radius:6px;font-family:inherit;font-size:14px;font-weight:600;border:none;cursor:pointer}
    .i-h1{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;color:#ededfc}
    .i-h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:600;color:#ededfc}
    .i-p{font-size:14px;color:rgba(237,237,252,.55);line-height:1.75}
    .i-input{background:#141420;border:1px solid rgba(255,255,255,.13);border-radius:6px;padding:10px 14px;color:#ededfc;font-family:inherit;font-size:13px;outline:none}
    .i-div{border:1.5px dashed rgba(79,126,248,.28);border-radius:8px;background:rgba(79,126,248,.04);display:flex;align-items:center;justify-content:center}
    .i-img{background:#111120;border:1px solid rgba(255,255,255,.06);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px}
    .i-vid{background:#000;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .i-vid::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#141428,#0a0a18)}
    .i-play{position:relative;z-index:1;width:42px;height:42px;border-radius:50%;background:rgba(79,126,248,.8);display:flex;align-items:center;justify-content:center}
    .i-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;background:rgba(79,126,248,.15);border:1px solid rgba(79,126,248,.3);color:#4f7ef8;font-size:12px;font-weight:600}
    .i-card{background:#141420;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px}
    .i-card-title{font-size:14px;font-weight:600;color:#ededfc;margin-bottom:6px}
    .i-card-body{font-size:12px;color:rgba(237,237,252,.45);line-height:1.6}
    .i-check{display:flex;align-items:center;gap:9px}
    .i-check-box{width:16px;height:16px;border:1.5px solid rgba(237,237,252,.2);border-radius:4px;background:#141420;flex-shrink:0}
    .i-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;border:1.5px dashed rgba(79,126,248,.22);border-radius:8px;padding:8px}
    .i-grid-cell{background:rgba(255,255,255,.04);border-radius:4px;border:1px dashed rgba(255,255,255,.06);min-height:50px}
    .i-nav{display:flex;align-items:center;gap:16px;background:#0f0f1a;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 16px}
    .i-nav-logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#4f7ef8}
    .i-nav-link{font-size:12px;color:rgba(237,237,252,.5)}
    .i-divider{height:1px}
  </style>
</head>
<body>
  <div class="canvas">

  </div>
</body>
</html>
